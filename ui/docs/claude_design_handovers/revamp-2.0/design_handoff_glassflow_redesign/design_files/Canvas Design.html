<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>GlassFlow · Canvas builder exploration</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/theme.css"/>
<link rel="stylesheet" href="styles/canvas.css"/>
<link rel="stylesheet" href="styles/pipeline-canvas.css"/>
<style>
  html, body { height: 100%; }
  body { background: #070708; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/canvas-primitives.jsx"></script>
<script type="text/babel" src="components/canvas-artboards1.jsx"></script>
<script type="text/babel" src="components/canvas-artboards2.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas
      title="GlassFlow · Canvas builder"
      subtitle="Phase 4 design exploration · node visual language, slot insertion, modal inspector, AI draft, deploy"
    >
      <DCSection
        id="hero"
        title="1 · Hero flow — Kafka → CH"
        subtitle="Two node visual variants of the same simple pipeline. Pick one to carry forward."
      >
        <DCArtboard id="hero-a" label="Variant A · compact nodes"       width={1680} height={940}>
          <ArtCanvasHeroA/>
        </DCArtboard>
        <DCArtboard id="hero-b" label="Variant B · banner + I/O pills"  width={1680} height={940}>
          <ArtCanvasHeroB/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="shapes"
        title="2 · Pipeline shapes"
        subtitle="Other supported topologies using the chosen node language."
      >
        <DCArtboard id="two-topic" label="Two-topic join → ClickHouse"  width={1680} height={1020}>
          <ArtCanvasJoin/>
        </DCArtboard>
        <DCArtboard id="otlp"      label="OTLP → ClickHouse"            width={1680} height={940}>
          <ArtCanvasOtlp/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="build"
        title="3 · Build flow — from empty to configured"
        subtitle="The core interaction loop: start empty, insert stages via slot picker, configure via modal."
      >
        <DCArtboard id="empty"   label="Empty canvas · starter slots"          width={1680} height={940}>
          <ArtCanvasEmpty/>
        </DCArtboard>
        <DCArtboard id="picker"  label="Slot picker · compatible vs locked"    width={1680} height={960}>
          <ArtCanvasSlotPicker/>
        </DCArtboard>
        <DCArtboard id="modal"   label="Modal inspector · Kafka source"        width={1680} height={1080}>
          <ArtCanvasModal/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="interact"
        title="4 · Interactions"
        subtitle="Drag-from-library, deploy review, draft persistence, AI co-pilot."
      >
        <DCArtboard id="drag"    label="Drag-from-library · legal drop targets" width={1680} height={940}>
          <ArtCanvasDrag/>
        </DCArtboard>
        <DCArtboard id="deploy"  label="Deploy review · pre-flight checks"      width={1680} height={1120}>
          <ArtCanvasDeploy/>
        </DCArtboard>
        <DCArtboard id="draft"   label="Save as draft · autosave history"       width={1680} height={940}>
          <ArtCanvasDraft/>
        </DCArtboard>
        <DCArtboard id="ai"      label="AI pre-populates canvas"                width={1680} height={940}>
          <ArtCanvasAI/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
