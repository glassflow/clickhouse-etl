<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>GlassFlow · App overview</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/theme.css"/>
<link rel="stylesheet" href="styles/canvas.css"/>
<link rel="stylesheet" href="styles/overview.css"/>
<style>
  html, body { height: 100%; }
  body { background: #070708; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/overview-artboards.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas
      title="GlassFlow · App overview"
      subtitle="The whole product on one canvas — sitemap, modules, cross-module wiring, key journeys, and the out-of-scope surfaces we need to remember exist"
    >
      <DCSection
        id="sitemap"
        title="1 · Sitemap"
        subtitle="Every route in the redesigned app, color-coded by status (exists, redesigning, new, sketched, external)."
      >
        <DCArtboard id="ov-sitemap" label="Full app sitemap · 6 top-level modules" width={1680} height={1240}>
          <ArtOverviewSitemap/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="modules"
        title="2 · Modules"
        subtitle="Each module's purpose, screens, and ownership. Primary modules are in this redesign; supporting are sketched only; external are links out."
      >
        <DCArtboard id="ov-modules" label="Module map · primary + supporting + external" width={1680} height={1580}>
          <ArtOverviewModules/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="wiring"
        title="3 · Cross-module wiring"
        subtitle="How the four primary modules hand off to each other. If a seam breaks here, the product stops feeling like one product."
      >
        <DCArtboard id="ov-wiring" label="Library ↔ Canvas ↔ AI ↔ Pipelines" width={1680} height={820}>
          <ArtOverviewWiring/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="journeys"
        title="4 · Key user journeys"
        subtitle="Five end-to-end flows that cross module boundaries. These are the redesign's smoke tests."
      >
        <DCArtboard id="ov-journeys" label="J1–J5 · first pipeline, schema rollout, creds rotation, DLQ debug, teammate review" width={1680} height={1320}>
          <ArtOverviewJourneys/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="oos"
        title="5 · Out-of-scope modules · sketches"
        subtitle="Things the nav assumes exist but we aren't designing in this round. Placeholder contracts so the product graph doesn't have holes."
      >
        <DCArtboard id="ov-oos" label="Observability · Team · Environments · Billing · API keys · Audit" width={1680} height={1080}>
          <ArtOverviewOutOfScope/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
