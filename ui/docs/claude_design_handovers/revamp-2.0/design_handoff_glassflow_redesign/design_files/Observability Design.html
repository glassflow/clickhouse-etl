<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>GlassFlow · Observability</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/theme.css"/>
<link rel="stylesheet" href="styles/canvas.css"/>
<link rel="stylesheet" href="styles/pipeline-canvas.css"/>
<link rel="stylesheet" href="styles/bridge.css"/>
<link rel="stylesheet" href="styles/observability.css"/>
<style>
  html, body { height: 100%; }
  body { background: #070708; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/canvas-primitives.jsx"></script>
<script type="text/babel" src="components/bridge-primitives.jsx"></script>
<script type="text/babel" src="components/observability-primitives.jsx"></script>
<script type="text/babel" src="components/observability-artboards1.jsx"></script>
<script type="text/babel" src="components/observability-artboards2.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const {
  ArtObsMetricsDashboard, ArtObsMetricFocus, ArtObsLoadingStates,
  ArtObsLogsLiveTail, ArtObsLogsSearch, ArtObsLogInspector,
  ArtObsDisabledState, ArtObsStatusCard
} = window;

function App() {
  return (
    <DesignCanvas
      title="GlassFlow · Observability"
      subtitle="Per-pipeline metrics (M3) and logs (M4) — pipeline-scoped, never cluster-wide. Bundled VictoriaMetrics + VictoriaLogs."
    >
      <DCSection
        id="metrics"
        title="1 · Per-pipeline metrics (M3)"
        subtitle="The Metrics tab on Pipeline Detail. Pipeline-scoped queries, component breakdown, brushed range pinned across panels."
      >
        <DCArtboard id="metrics-dashboard" label="O1 · Metrics dashboard · populated"  width={1680} height={1500}>
          <ArtObsMetricsDashboard/>
        </DCArtboard>
        <DCArtboard id="metrics-focus"     label="O2 · Drill-down · component breakdown + brushed range" width={1680} height={1300}>
          <ArtObsMetricFocus/>
        </DCArtboard>
        <DCArtboard id="metrics-states"    label="O3 · Loading · no-data · retention edge · query error" width={1680} height={1000}>
          <ArtObsLoadingStates/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="logs"
        title="2 · Per-pipeline logs (M4)"
        subtitle="The Logs tab on Pipeline Detail. Live tail by default, LogsQL search, structured-record inspector."
      >
        <DCArtboard id="logs-tail"      label="O4 · Live tail · component &amp; severity filters"   width={1680} height={1500}>
          <ArtObsLogsLiveTail/>
        </DCArtboard>
        <DCArtboard id="logs-search"    label="O5 · Search · context expansion · range correlation" width={1680} height={1480}>
          <ArtObsLogsSearch/>
        </DCArtboard>
        <DCArtboard id="logs-inspector" label="O6 · Log line inspector · drawer"                    width={1680} height={1280}>
          <ArtObsLogInspector/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="ops"
        title="3 · Stack &amp; admin surfaces"
        subtitle="What happens when the bundled stack is off, and how the admin sees the underlying VM/VL."
      >
        <DCArtboard id="ops-disabled" label="O7 · Disabled / BYO state"                width={1680} height={1280}>
          <ArtObsDisabledState/>
        </DCArtboard>
        <DCArtboard id="ops-status"   label="O8 · Settings → Observability · status &amp; retention" width={1680} height={1500}>
          <ArtObsStatusCard/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
