<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>GlassFlow · Pipeline detail · Overview tab</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/theme.css"/>
<link rel="stylesheet" href="styles/canvas.css"/>
<link rel="stylesheet" href="styles/bridge.css"/>
<link rel="stylesheet" href="styles/observability.css"/>
<link rel="stylesheet" href="styles/versions.css"/>
<link rel="stylesheet" href="styles/overview-tab.css"/>
<style>
  html, body { height: 100%; }
  body { background: #070708; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/canvas-primitives.jsx"></script>
<script type="text/babel" src="components/bridge-primitives.jsx"></script>
<script type="text/babel" src="components/observability-primitives.jsx"></script>
<script type="text/babel" src="components/overview-tab-artboards.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { ArtPipeOverviewHealthy, ArtPipeOverviewIssue } = window;

function App() {
  return (
    <DesignCanvas
      title="GlassFlow · Pipeline detail · Overview tab"
      subtitle="T-04. The default tab on every pipeline detail page — a local cockpit that answers 'is this pipeline OK and what should I look at next?' in five seconds. Stat strip + read-only topology + jump-to tiles + activity feed in the main column; health checklist + library snapshot + metadata in the right rail. Two artboards explore healthy and degraded states. Re-uses the OBPipelineHeader / OBTabs / OBSpark primitives so this surface feels of-a-piece with Metrics and Logs, which sit one tab over."
    >
      <DCSection
        id="healthy"
        title="1 · Healthy pipeline"
        subtitle="Default state. All four KPIs in the green tone, topology shows the full chain with throughput labels on edges, jump-tiles report 'all clear' rather than going dark — empty doesn't mean useful, so each tile carries a current value. Right rail's 10/10 health checklist is the one place we lean into a green block of text; everywhere else green is reserved for verbs."
      >
        <DCArtboard id="ot-healthy" label="Overview · checkout-orders · v12 · running clean" width={1680} height={1380}>
          <ArtPipeOverviewHealthy/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="degraded"
        title="2 · Pipeline with active issues"
        subtitle="Same surface, three failing checks. The cockpit demonstrates its main job — replacing 'open metrics, then open logs, then open versions, then guess' with a single page that points a finger. Top banner names the cause (sink pool saturated), KPIs flip tones, the bottleneck node in the topology gets a red border, jump-tiles surface counts (DLQ ×47, lag 412ms, last deploy 22m ago) so the rollback / replay / metrics paths are obvious, and the right rail flips from health-list to a quick-actions panel: investigate with AI, roll back, pause, replay DLQ."
      >
        <DCArtboard id="ot-degraded" label="Overview · user-events-enrich · v18 · degraded · DLQ +47" width={1680} height={1500}>
          <ArtPipeOverviewIssue/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
