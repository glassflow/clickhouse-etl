<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>GlassFlow · Review generated config</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/theme.css"/>
<link rel="stylesheet" href="styles/canvas.css"/>
<link rel="stylesheet" href="styles/bridge.css"/>
<link rel="stylesheet" href="styles/observability.css"/>
<link rel="stylesheet" href="styles/review-config.css"/>
<style>html, body { height: 100%; } body { background: #070708; }</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/canvas-primitives.jsx"></script>
<script type="text/babel" src="components/bridge-primitives.jsx"></script>
<script type="text/babel" src="components/observability-primitives.jsx"></script>
<script type="text/babel" src="components/tweaks-panel.jsx"></script>
<script type="text/babel" src="components/review-config-artboards.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;
const { ArtRCDefault, ArtRCWarn, ArtRCEdit, ArtRCFromSchema } = window;
const { TweaksPanel, useTweaks, TweakSection, TweakRadio, TweakSelect, TweakToggle } = window;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "source": "chat",
  "warnings": "none",
  "show_sample": true,
  "show_dryrun": true,
  "approval_required": true
}/*EDITMODE-END*/;

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);
  return (
    <>
      <DesignCanvas
        title="GlassFlow · Review generated config"
        subtitle="T-12 · Closes the AI handoff loop. AI drafts a config (from chat, Library template, or Schema evolution), user reviews + edits before commit. Three columns: source-of-truth (left, why), YAML (middle, what), pre-flight checks (right, is-it-safe). The trust banner is the critical anchor — every AI surface must explicitly state nothing has been deployed."
      >
        <DCSection
          id="default"
          title="1 · Default · clean draft, ready to commit"
          subtitle="Happy path. AI drafted from a chat prompt + Library template; pre-flight is 4/4 green; sample + dry-run both pass; commit kicks off the team's standard 2-approver review. The three-column layout is consistent across every state."
        >
          <DCArtboard id="rc-default" label="Default · 4/4 checks · ready to commit" width={1620} height={1280}>
            <ArtRCDefault/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="warn"
          title="2 · Warnings · sink lacks idempotency, AI offers fix"
          subtitle="Pre-flight surfaces 2 actionable issues, each with an atomic AI fix users can accept individually. Two-button commit pattern: the safe path is greyed but reachable; the override is explicitly named 'Commit anyway' (not 'Force'). Every warning carries the why so users learn what to look for next time."
        >
          <DCArtboard id="rc-warn" label="Warnings · 2 unresolved · AI fixes available" width={1620} height={1280}>
            <ArtRCWarn/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="edit"
          title="3 · Inline edit via chat refinement"
          subtitle="Chat-to-edit keeps the diff narrow — refinements only touch the line(s) asked about, prior YAML preserved untouched. Refinement history column on the left shows the conversation; YAML column highlights changed lines in orange; dry-run re-runs after every edit so consequences surface immediately (here: a smaller dedup window catches less duplication, an advisory not a block)."
        >
          <DCArtboard id="rc-edit" label="Edit · 2 refinements · diff stays narrow" width={1620} height={1320}>
            <ArtRCEdit/>
          </DCArtboard>
        </DCSection>

        <DCSection
          id="from-schema"
          title="4 · From Schema evolution · migration step 3/4"
          subtitle="Same surface, different framing — source pill turns blue (came from a migration, not a chat), the context column explains the upstream change in the migration's own words, and the commit button reads 'start dual-write canary' because committing here means stepping into cutover, not deploying outright. Footer reinforces that distinction."
        >
          <DCArtboard id="rc-from-schema" label="From schema evo · v3→v4 · step 3/4" width={1620} height={1380}>
            <ArtRCFromSchema/>
          </DCArtboard>
        </DCSection>
      </DesignCanvas>

      <TweaksPanel title="Tweaks · Review config">
        <TweakSection title="Generation source">
          <TweakRadio
            value={t.source}
            onChange={v => setTweak('source', v)}
            options={[
              { value: 'chat',     label: 'AI chat prompt' },
              { value: 'template', label: 'Library template' },
              { value: 'schema',   label: 'Schema evolution' },
            ]}
          />
          <p style={{margin:'8px 0 0', fontSize:11, color:'var(--color-gray-dark-500)', lineHeight:1.5}}>
            Source pill + context column reframe. Schema mode also changes the commit CTA wording.
          </p>
        </TweakSection>

        <TweakSection title="Pre-flight outcome">
          <TweakRadio
            value={t.warnings}
            onChange={v => setTweak('warnings', v)}
            options={[
              { value: 'none',  label: 'All green' },
              { value: 'soft',  label: 'Advisory only' },
              { value: 'hard',  label: 'Blocking warnings' },
            ]}
          />
        </TweakSection>

        <TweakSection title="Display">
          <TweakToggle label="Sample-data preview ribbon" value={t.show_sample}  onChange={v => setTweak('show_sample',  v)}/>
          <TweakToggle label="Dry-run summary card"       value={t.show_dryrun}  onChange={v => setTweak('show_dryrun',  v)}/>
        </TweakSection>

        <TweakSection title="Commit policy">
          <TweakToggle
            label="Require team approval before deploy"
            value={t.approval_required}
            onChange={v => setTweak('approval_required', v)}
          />
        </TweakSection>
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
