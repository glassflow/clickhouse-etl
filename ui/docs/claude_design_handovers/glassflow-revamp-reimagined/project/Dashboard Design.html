<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>GlassFlow · Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="stylesheet" href="styles/base.css"/>
<link rel="stylesheet" href="styles/theme.css"/>
<link rel="stylesheet" href="styles/canvas.css"/>
<link rel="stylesheet" href="styles/dashboard.css"/>
<style>
  html, body { height: 100%; }
  body { background: #070708; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/shell.jsx"></script>
<script type="text/babel" src="components/dashboard-artboards.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard } = window;

function App() {
  return (
    <DesignCanvas
      title="GlassFlow · Dashboard"
      subtitle="T-01 · The control-plane home surface. Four states answering 'what needs my attention?' in increasing severity, plus the day-zero first-run experience."
    >
      <DCSection
        id="default"
        title="1 · Default state"
        subtitle="Normal operating day — a couple of incidents in the attention queue, throughput chart trending healthy, full pipeline status table below."
      >
        <DCArtboard id="dash-populated" label="Populated · 3 incidents · 14 pipelines" width={1440} height={1340}>
          <ArtDashPopulated/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="healthy"
        title="2 · All-healthy state"
        subtitle="What the dashboard looks like when nothing's wrong. The attention queue is replaced with a positive banner — same surface, different center of gravity."
      >
        <DCArtboard id="dash-healthy" label="All healthy · positive banner" width={1440} height={1100}>
          <ArtDashHealthy/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="incidents"
        title="3 · Multi-incident state"
        subtitle="The other extreme — multiple critical incidents, KPIs in red, table filtered to degraded. Tests that the layout holds when bad news stacks."
      >
        <DCArtboard id="dash-incidents" label="Multi-incident · 5 in queue" width={1440} height={1480}>
          <ArtDashIncidents/>
        </DCArtboard>
      </DCSection>

      <DCSection
        id="empty"
        title="4 · First-run empty state"
        subtitle="Day zero — no pipelines, no connections. The dashboard's job here is not to show metrics; it's to launch the user toward Create. Nav is collapsed because the rest of the app has nothing in it yet."
      >
        <DCArtboard id="dash-empty" label="First-run · five entry paths" width={1440} height={920}>
          <ArtDashEmpty/>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
