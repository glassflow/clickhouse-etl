mode: deployment

image:
  repository: otel/opentelemetry-collector-contrib
  tag: "0.120.0"

config:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

  processors:
    batch:
      send_batch_size: 64
      send_batch_max_size: 128
    memory_limiter:
      limit_mib: 128
      check_interval: 1s
    # Compliance-style redaction before GlassFlow (literal / attribute-level; not GlassFlow expr replace()).
    transform/redact:
      error_mode: ignore
      trace_statements:
        - context: resource
          statements:
            - set(attributes["user_email"], "[REDACTED]") where attributes["user_email"] != nil
            - set(attributes["demo_ssn"], "[REDACTED]") where attributes["demo_ssn"] != nil
        - context: span
          statements:
            - set(attributes["user_email"], "[REDACTED]") where attributes["user_email"] != nil
            - set(attributes["demo_ssn"], "[REDACTED]") where attributes["demo_ssn"] != nil
    # Keep all error traces; probabilistic ~10% of the rest (see GUIDE.md).
    tail_sampling:
      decision_wait: 5s
      num_traces: 50000
      policies:
        - name: keep-errors
          type: status_code
          status_code:
            status_codes: [ERROR]
        - name: keep-10pct-ok
          type: probabilistic
          probabilistic:
            sampling_percentage: 10

  exporters:
    otlp/glassflow-traces:
      endpoint: "glassflow-otlp-receiver.glassflow.svc.cluster.local:4317"
      tls:
        insecure: true
      headers:
        x-glassflow-pipeline-id: "otlp-traces"

  service:
    pipelines:
      traces:
        receivers: [otlp]
        processors: [memory_limiter, transform/redact, tail_sampling, batch]
        exporters: [otlp/glassflow-traces]

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 200m
    memory: 256Mi

ports:
  otlp:
    enabled: true
    containerPort: 4317
    servicePort: 4317
    protocol: TCP
  otlp-http:
    enabled: true
    containerPort: 4318
    servicePort: 4318
    protocol: TCP
